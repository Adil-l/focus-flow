<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blocked · Focus Flow</title>
  <style>
    * { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center;
      background: radial-gradient(120% 120% at 50% 0%, #1c1330 0%, #0e0a17 60%); color: #f4f1fa; }
    .card { text-align: center; max-width: 460px; padding: 40px; }
    .emoji { font-size: 56px; }
    h1 { font-size: 26px; margin: 14px 0 6px; }
    p { color: #ffffff99; line-height: 1.5; }
    .dom { display: inline-block; margin-top: 10px; font-family: ui-monospace, monospace;
      background: #ffffff12; border: 1px solid #ffffff1f; padding: 6px 12px; border-radius: 10px; font-size: 13px; }
    .tag { margin-top: 22px; font-size: 12px; color: #c4b5fd; text-transform: uppercase; letter-spacing: .15em; font-weight: 800; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji" id="emoji">🌱</div>
    <h1 id="title">Stay in the flow</h1>
    <p id="msg">This site is blocked by Focus Flow so you can keep your focus. Take a breath and get back to what matters.</p>
    <div class="dom" id="dom"></div>
    <div class="tag">Focus Flow Blocker</div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    if (params.get('break') === '1') {
      document.getElementById('emoji').textContent = '☕';
      document.getElementById('title').textContent = 'Mandatory break in progress';
      document.getElementById('msg').textContent =
        'Step away from the screen — the browser is locked until your break ends. Open your Focus Flow tab to see the countdown.';
      document.getElementById('dom').style.display = 'none';
    } else {
      const d = params.get('d');
      if (d) document.getElementById('dom').textContent = d;
      else document.getElementById('dom').style.display = 'none';
    }
  </script>
</body>
</html>
